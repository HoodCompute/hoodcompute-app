title: HoodCompute Documentation
description: Decentralized AI inference on Robinhood Chain. Private, open, on-chain.

remote_theme: just-the-docs/just-the-docs

url: https://docs.hoodcompute.com
baseurl: ""

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 3

# Header navigation links
aux_links:
  "App": "https://hoodcompute.com/app"
  "GitHub": "https://github.com/hoodcompute"
aux_links_new_tab: true

# Footer
footer_content: "Copyright &copy; 2026 HoodCompute. All rights reserved."
back_to_top: true
back_to_top_text: "Back to top"

# Color scheme
color_scheme: dark

# Callout types
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: red

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-remote-theme

# Exclude from build
exclude:
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
