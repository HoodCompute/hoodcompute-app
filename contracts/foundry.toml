[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "tests"
script = "script"
solc_version = "0.8.30"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
robinhood_testnet = "https://rpc.testnet.chain.robinhood.com"
robinhood_mainnet = "https://rpc.mainnet.chain.robinhood.com"

# Robinhood Chain: testnet chain ID 46630, mainnet chain ID 4663.
# Deployed testnet addresses are recorded in the README contract table.
